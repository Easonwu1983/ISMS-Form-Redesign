openapi: 3.0.3
info:
  title: ISMS Campus Backend API
  version: 1.0.0
  description: 校園資安管理系統 (ISMS) 後端 API — 涵蓋帳號申請、檢核表、矯正單、教育訓練、資產盤點等模組。

servers:
  - url: http://localhost:8787
    description: 本地開發

tags:
  - name: Auth
    description: 認證與密碼管理
  - name: SystemUser
    description: 系統使用者管理
  - name: UnitContact
    description: 單位資安窗口申請
  - name: Checklist
    description: 內稽檢核表
  - name: CorrectiveAction
    description: 矯正預防措施
  - name: Training
    description: 教育訓練
  - name: TrainingRoster
    description: 教育訓練名冊
  - name: ReviewScope
    description: 審查範圍管理
  - name: Attachment
    description: 附件上傳與下載
  - name: AuditTrail
    description: 稽核軌跡
  - name: UnitGovernance
    description: 單位治理
  - name: AssetInventory
    description: 資訊資產盤點
  - name: Dashboard
    description: 儀表板與待辦事項
  - name: Ops
    description: 營運管理與批次作業

# ─────────────────────────────────────────────────────
#  Security
# ─────────────────────────────────────────────────────
security:
  - cookieAuth: []

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: isms_session

  # ── Shared Schemas ──────────────────────────────────
  schemas:

    # -- Common --
    ErrorResponse:
      type: object
      properties:
        ok: { type: boolean, example: false }
        error: { type: string }
        statusCode: { type: integer }

    AuthError:
      type: object
      properties:
        ok: { type: boolean, example: false }
        error: { type: string, example: 未授權 }
        statusCode: { type: integer, example: 401 }

    ForbiddenError:
      type: object
      properties:
        ok: { type: boolean, example: false }
        error: { type: string, example: Forbidden }
        statusCode: { type: integer, example: 403 }

    PageMeta:
      type: object
      properties:
        offset: { type: integer }
        limit: { type: integer }
        total: { type: integer }
        pageCount: { type: integer }
        currentPage: { type: integer }
        hasPrev: { type: boolean }
        hasNext: { type: boolean }
        prevOffset: { type: integer }
        nextOffset: { type: integer }
        pageStart: { type: integer }
        pageEnd: { type: integer }

    HealthResponse:
      type: object
      properties:
        ok: { type: boolean }
        ready: { type: boolean }
        contractVersion: { type: string }
        repository: { type: string }
        database:
          type: object
          properties:
            ok: { type: boolean }
            latencyMs: { type: number }

    ActionEnvelope:
      type: object
      required: [action, payload]
      properties:
        action: { type: string }
        payload: { type: object }
        contractVersion: { type: string }

    # -- Auth --
    LoginRequest:
      type: object
      required: [action, payload]
      properties:
        action: { type: string, example: LOGIN }
        payload:
          type: object
          required: [username, password]
          properties:
            username: { type: string }
            password: { type: string }

    LoginResponse:
      type: object
      properties:
        ok: { type: boolean }
        user:
          $ref: '#/components/schemas/SessionUser'
        mustChangePassword: { type: boolean }

    SessionUser:
      type: object
      properties:
        username: { type: string }
        name: { type: string }
        email: { type: string }
        role: { type: string }
        primaryUnit: { type: string }
        authorizedUnits: { type: array, items: { type: string } }
        securityRoles: { type: array, items: { type: string } }

    ChangePasswordRequest:
      type: object
      required: [action, payload]
      properties:
        action: { type: string, example: CHANGE_PASSWORD }
        payload:
          type: object
          required: [currentPassword, newPassword]
          properties:
            currentPassword: { type: string }
            newPassword: { type: string }

    RequestResetRequest:
      type: object
      required: [action, payload]
      properties:
        action: { type: string, example: REQUEST_RESET }
        payload:
          type: object
          required: [email]
          properties:
            email: { type: string, format: email }

    RedeemResetRequest:
      type: object
      required: [action, payload]
      properties:
        action: { type: string, example: REDEEM_RESET }
        payload:
          type: object
          required: [token, newPassword]
          properties:
            token: { type: string }
            newPassword: { type: string }

    # -- System User --
    SystemUser:
      type: object
      properties:
        username: { type: string }
        name: { type: string }
        email: { type: string }
        role: { type: string, enum: [管理員, 單位管理員, 稽核員, 一般使用者] }
        primaryUnit: { type: string }
        authorizedUnits: { type: array, items: { type: string } }
        securityRoles: { type: array, items: { type: string } }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    SystemUserUpsertRequest:
      type: object
      required: [action, payload]
      properties:
        action: { type: string, example: UPSERT }
        payload:
          type: object
          required: [username, email, role]
          properties:
            username: { type: string }
            name: { type: string }
            email: { type: string }
            role: { type: string }
            primaryUnit: { type: string }
            authorizedUnits: { type: array, items: { type: string } }
            securityRoles: { type: array, items: { type: string } }

    # -- Unit Contact Application --
    Application:
      type: object
      properties:
        id: { type: string }
        applicantName: { type: string }
        applicantEmail: { type: string }
        extensionNumber: { type: string }
        unitCategory: { type: string }
        primaryUnit: { type: string }
        secondaryUnit: { type: string }
        unitValue: { type: string }
        unitCode: { type: string }
        contactType: { type: string }
        note: { type: string }
        authorizedUnits: { type: array, items: { type: string } }
        securityRoles: { type: array, items: { type: string } }
        status: { type: string }
        statusLabel: { type: string }
        statusDetail: { type: string }
        submittedAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        reviewedAt: { type: string, format: date-time }
        reviewedBy: { type: string }
        reviewComment: { type: string }

    ApplyRequest:
      type: object
      required: [action, payload]
      properties:
        action: { type: string, example: APPLY }
        payload:
          type: object
          required: [applicantName, applicantEmail, unitValue, contactType]
          properties:
            applicantName: { type: string }
            applicantEmail: { type: string }
            extensionNumber: { type: string }
            unitCategory: { type: string }
            primaryUnit: { type: string }
            secondaryUnit: { type: string }
            unitValue: { type: string }
            unitCode: { type: string }
            contactType: { type: string }
            note: { type: string }
            authorizedUnits: { type: array, items: { type: string } }
            securityRoles: { type: array, items: { type: string } }

    ReviewRequest:
      type: object
      required: [action, payload]
      properties:
        action: { type: string, example: REVIEW }
        payload:
          type: object
          required: [applicationId, decision]
          properties:
            applicationId: { type: string }
            decision: { type: string, enum: [approved, returned, rejected] }
            reviewComment: { type: string }

    ActivateRequest:
      type: object
      required: [action, payload]
      properties:
        action: { type: string, example: ACTIVATE }
        payload:
          type: object
          required: [applicationId]
          properties:
            applicationId: { type: string }

    # -- Checklist --
    Checklist:
      type: object
      properties:
        id: { type: string }
        documentNo: { type: string }
        checklistSeq: { type: integer }
        unit: { type: string }
        unitCode: { type: string }
        fillerName: { type: string }
        fillerUsername: { type: string }
        fillDate: { type: string, format: date-time }
        auditYear: { type: string }
        supervisorName: { type: string }
        supervisorTitle: { type: string }
        signStatus: { type: string }
        results: { type: object }
        summary:
          type: object
          properties:
            total: { type: integer }
            conform: { type: integer }
            partial: { type: integer }
            nonConform: { type: integer }
            na: { type: integer }
        answeredCount: { type: integer }
        status: { type: string, enum: [草稿, 已送出] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    ChecklistWriteRequest:
      type: object
      required: [action, payload]
      properties:
        action: { type: string, enum: [SAVE_DRAFT, SUBMIT] }
        payload:
          type: object
          properties:
            unit: { type: string }
            unitCode: { type: string }
            fillerName: { type: string }
            fillerUsername: { type: string }
            fillDate: { type: string }
            auditYear: { type: string }
            supervisorName: { type: string }
            supervisorTitle: { type: string }
            results: { type: object }
            summary:
              type: object
              properties:
                total: { type: integer }
                conform: { type: integer }
                partial: { type: integer }
                nonConform: { type: integer }
                na: { type: integer }

    # -- Corrective Action --
    CorrectiveActionCase:
      type: object
      properties:
        id: { type: string }
        documentNo: { type: string }
        caseSeq: { type: integer }
        proposerUnit: { type: string }
        proposerName: { type: string }
        handlerUnit: { type: string }
        handlerName: { type: string }
        handlerEmail: { type: string }
        deficiencyType: { type: string }
        source: { type: string }
        category: { type: array, items: { type: string } }
        clause: { type: string }
        problemDesc: { type: string }
        correctiveAction: { type: string }
        correctiveDueDate: { type: string, format: date-time }
        status: { type: string, enum: [待矯正, 已提案, 審核中, 追蹤中, 結案, 退回] }
        trackings: { type: array, items: { type: object } }
        evidence: { type: array, items: { type: object } }
        history: { type: array, items: { type: object } }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    # -- Training Form --
    TrainingForm:
      type: object
      properties:
        id: { type: string }
        documentNo: { type: string }
        formSeq: { type: integer }
        unit: { type: string }
        unitCode: { type: string }
        statsUnit: { type: string }
        fillerName: { type: string }
        fillerUsername: { type: string }
        fillDate: { type: string }
        trainingYear: { type: string }
        status: { type: string, enum: [暫存, 待簽核, 已完成填報, 退回更正] }
        records: { type: array, items: { type: object } }
        summary: { type: object }
        signedFiles: { type: array, items: { type: object } }
        returnReason: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    TrainingRoster:
      type: object
      properties:
        id: { type: string }
        unit: { type: string }
        statsUnit: { type: string }
        l1Unit: { type: string }
        name: { type: string }
        unitName: { type: string }
        identity: { type: string }
        jobTitle: { type: string }
        source: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    # -- Review Scope --
    ReviewScope:
      type: object
      properties:
        id: { type: string }
        username: { type: string }
        unit: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    ReviewScopeReplaceRequest:
      type: object
      required: [action, payload]
      properties:
        action: { type: string, example: REPLACE }
        payload:
          type: object
          required: [username, units]
          properties:
            username: { type: string }
            units: { type: array, items: { type: string } }

    # -- Attachment --
    AttachmentItem:
      type: object
      properties:
        attachmentId: { type: string }
        name: { type: string }
        size: { type: integer }
        contentType: { type: string }
        scope: { type: string }
        ownerId: { type: string }
        recordType: { type: string }
        path: { type: string }
        uploadedAt: { type: string, format: date-time }
        storage: { type: string }

    UploadAttachmentRequest:
      type: object
      required: [action, payload]
      properties:
        action: { type: string, example: UPLOAD }
        payload:
          type: object
          required: [fileName, contentBase64, scope, ownerId]
          properties:
            attachmentId: { type: string }
            fileName: { type: string }
            contentType: { type: string }
            contentBase64: { type: string, format: byte }
            scope: { type: string }
            ownerId: { type: string }
            recordType: { type: string }

    # -- Audit Trail --
    AuditEntry:
      type: object
      properties:
        listItemId: { type: string }
        title: { type: string }
        eventType: { type: string }
        actorEmail: { type: string }
        targetEmail: { type: string }
        unitCode: { type: string }
        recordId: { type: string }
        occurredAt: { type: string, format: date-time }
        payload: { type: object, nullable: true }

    # -- Asset Inventory --
    InformationAsset:
      type: object
      properties:
        id: { type: string }
        assetName: { type: string }
        category: { type: string }
        subCategory: { type: string }
        ownerName: { type: string }
        custodianName: { type: string }
        userName: { type: string }
        unitCode: { type: string }
        unitName: { type: string }
        confidentiality: { type: string, enum: [普, 中, 高] }
        integrity: { type: string, enum: [普, 中, 高] }
        availability: { type: string, enum: [普, 中, 高] }
        legalCompliance: { type: string, enum: [普, 中, 高] }
        protectionLevel: { type: string, enum: [普, 中, 高] }
        hasPii: { type: boolean }
        hasSensitivePii: { type: boolean }
        inventoryYear: { type: integer }
        changeType: { type: string, enum: [新增, 異動, 刪除] }
        isItSystem: { type: boolean }
        isChinaBrand: { type: boolean }
        status: { type: string, enum: [填報中, 待簽核, 已完成] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    # -- Unit Governance --
    UnitGovernanceEntry:
      type: object
      properties:
        unitCode: { type: string }
        unitName: { type: string }

  # ── Common Responses ────────────────────────────────
  responses:
    Unauthorized:
      description: 未認證
      content:
        application/json:
          schema: { $ref: '#/components/schemas/AuthError' }
    Forbidden:
      description: 無權限
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ForbiddenError' }
    NotFound:
      description: 找不到資源
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    ServerError:
      description: 伺服器錯誤
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

# ═════════════════════════════════════════════════════
#  Paths
# ═════════════════════════════════════════════════════
paths:

  # ───── Auth ─────────────────────────────────────────

  /api/auth/health:
    get:
      tags: [Auth]
      summary: 認證模組健康檢查
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthResponse' }

  /api/auth/login:
    post:
      tags: [Auth]
      summary: 使用者登入
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: 登入成功 (Set-Cookie isms_session)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LoginResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '423':
          description: 帳號鎖定
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /api/auth/verify:
    get:
      tags: [Auth]
      summary: 驗證 session 有效性
      responses:
        '200':
          description: session 有效
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  user: { $ref: '#/components/schemas/SessionUser' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: 登出（清除 session cookie）
      responses:
        '200':
          description: 登出成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }

  /api/auth/request-reset:
    post:
      tags: [Auth]
      summary: 請求密碼重設（寄送重設連結）
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RequestResetRequest' }
      responses:
        '200':
          description: 重設郵件已寄出
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
        '429':
          description: 請求頻率過高
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /api/auth/redeem-reset:
    post:
      tags: [Auth]
      summary: 使用重設 token 設定新密碼
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RedeemResetRequest' }
      responses:
        '200':
          description: 密碼重設成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
        '400': { $ref: '#/components/responses/NotFound' }

  /api/auth/change-password:
    post:
      tags: [Auth]
      summary: 變更密碼（需登入）
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ChangePasswordRequest' }
      responses:
        '200':
          description: 密碼變更成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ───── System Users ────────────────────────────────

  /api/system-users/health:
    get:
      tags: [SystemUser]
      summary: 使用者模組健康檢查
      security: []
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthResponse' }

  /api/system-users:
    get:
      tags: [SystemUser]
      summary: 列出所有系統使用者（管理員）
      parameters:
        - name: keyword
          in: query
          schema: { type: string }
        - name: role
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        '200':
          description: 使用者列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/SystemUser' }
                  total: { type: integer }
                  page: { $ref: '#/components/schemas/PageMeta' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/system-users/upsert:
    post:
      tags: [SystemUser]
      summary: 新增或更新系統使用者（管理員）
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SystemUserUpsertRequest' }
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  item: { $ref: '#/components/schemas/SystemUser' }
        '201':
          description: 新增成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  item: { $ref: '#/components/schemas/SystemUser' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/system-users/{username}:
    get:
      tags: [SystemUser]
      summary: 取得單一使用者詳情
      parameters:
        - name: username
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  item: { $ref: '#/components/schemas/SystemUser' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/system-users/{username}/delete:
    post:
      tags: [SystemUser]
      summary: 刪除系統使用者（管理員）
      parameters:
        - name: username
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ActionEnvelope' }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  deletedUsername: { type: string }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/system-users/{username}/reset-password:
    post:
      tags: [SystemUser]
      summary: 管理員重設使用者密碼
      parameters:
        - name: username
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ActionEnvelope' }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  temporaryPassword: { type: string }
        '403': { $ref: '#/components/responses/Forbidden' }

  # ───── Unit Contact ────────────────────────────────

  /api/unit-contact/health:
    get:
      tags: [UnitContact]
      summary: 單位窗口模組健康檢查
      security: []
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthResponse' }

  /api/unit-contact/apply:
    post:
      tags: [UnitContact]
      summary: 提交資安窗口申請（公開）
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ApplyRequest' }
      responses:
        '201':
          description: 申請已送出
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  application: { $ref: '#/components/schemas/Application' }
        '409':
          description: 重複申請
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '429':
          description: 請求頻率過高
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }


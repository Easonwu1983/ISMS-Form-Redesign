          description: 不允許的檔案類型
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /api/attachments/public-upload:
    post:
      tags: [Attachment]
      summary: 公開上傳附件（授權書用）
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UploadAttachmentRequest' }
      responses:
        '201':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  item: { $ref: '#/components/schemas/AttachmentItem' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/attachments/{attachmentId}:
    get:
      tags: [Attachment]
      summary: 取得附件 metadata
      parameters:
        - name: attachmentId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  item: { $ref: '#/components/schemas/AttachmentItem' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/attachments/{attachmentId}/content:
    get:
      tags: [Attachment]
      summary: 下載附件檔案內容
      parameters:
        - name: attachmentId
          in: path
          required: true
          schema: { type: string }
        - name: download
          in: query
          description: 設為 1 時以 attachment 方式下載
          schema: { type: string, enum: ['0', '1'] }
      responses:
        '200':
          description: 檔案二進位內容
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/attachments/{attachmentId}/delete:
    post:
      tags: [Attachment]
      summary: 刪除附件
      parameters:
        - name: attachmentId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ActionEnvelope' }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  deletedId: { type: string }
        '403': { $ref: '#/components/responses/Forbidden' }

  # ───── Audit Trail ─────────────────────────────────

  /api/audit-trail/health:
    get:
      tags: [AuditTrail]
      summary: 稽核軌跡模組健康檢查
      security: []
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthResponse' }

  /api/audit-trail:
    get:
      tags: [AuditTrail]
      summary: 列出稽核軌跡（管理員）
      parameters:
        - name: keyword
          in: query
          schema: { type: string }
        - name: eventType
          in: query
          schema: { type: string }
        - name: actorEmail
          in: query
          schema: { type: string }
        - name: targetEmail
          in: query
          schema: { type: string }
        - name: unitCode
          in: query
          schema: { type: string }
        - name: recordId
          in: query
          schema: { type: string }
        - name: occurredFrom
          in: query
          schema: { type: string, format: date }
        - name: occurredTo
          in: query
          schema: { type: string, format: date }
        - name: summaryOnly
          in: query
          schema: { type: string, enum: ['0', '1'] }
        - name: limit
          in: query
          schema: { type: integer, default: 100 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/AuditEntry' }
                  total: { type: integer }
                  summary: { type: object }
                  page: { $ref: '#/components/schemas/PageMeta' }
        '403': { $ref: '#/components/responses/Forbidden' }

  # ───── Unit Governance ─────────────────────────────

  /api/unit-governance/health:
    get:
      tags: [UnitGovernance]
      summary: 單位治理模組健康檢查
      security: []
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthResponse' }

  /api/unit-governance:
    get:
      tags: [UnitGovernance]
      summary: 列出所有單位治理記錄
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/UnitGovernanceEntry' }

  /api/unit-governance/upsert:
    post:
      tags: [UnitGovernance]
      summary: 新增或更新單位治理記錄（管理員）
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ActionEnvelope' }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/security-window/inventory:
    get:
      tags: [UnitGovernance]
      summary: 資安窗口盤點資料
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  items: { type: array, items: { type: object } }

  # ───── Asset Inventory ─────────────────────────────

  /api/assets/health:
    get:
      tags: [AssetInventory]
      summary: 資產盤點模組健康檢查
      security: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }
                  module: { type: string, example: asset-inventory }

  /api/assets:
    get:
      tags: [AssetInventory]
      summary: 列出資訊資產
      parameters:
        - name: year
          in: query
          schema: { type: integer }
        - name: unit
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string }
        - name: category
          in: query
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/InformationAsset' }
                  total: { type: integer }
    post:
      tags: [AssetInventory]
      summary: 新增資訊資產
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [assetName, category]
              properties:
                assetName: { type: string }
                category: { type: string }
                subCategory: { type: string }
                ownerName: { type: string }
                custodianName: { type: string }
                unitCode: { type: string }
                unitName: { type: string }
                confidentiality: { type: string }
                integrity: { type: string }
                availability: { type: string }
                legalCompliance: { type: string }
                inventoryYear: { type: integer }
      responses:
        '201':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InformationAsset' }

  /api/assets/summary:
    get:
      tags: [AssetInventory]
      summary: 資產盤點儀表板摘要
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  year: { type: integer }
                  summary: { type: array, items: { type: object } }

  /api/assets/batch-status:
    post:
      tags: [AssetInventory]
      summary: 批次更新資產狀態（整個單位）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status, unitCode]
              properties:
                status: { type: string }
                unitCode: { type: string }
                year: { type: integer }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated: { type: integer }

  /api/assets/{assetId}:
    get:
      tags: [AssetInventory]
      summary: 取得單一資產詳情（含附表十）
      parameters:
        - name: assetId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InformationAsset' }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      tags: [AssetInventory]
      summary: 更新資訊資產
      parameters:
        - name: assetId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                assetName: { type: string }
                category: { type: string }
                rowVersion: { type: integer }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InformationAsset' }
        '409':
          description: 版本衝突
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /api/assets/{assetId}/delete:
    post:
      tags: [AssetInventory]
      summary: 軟刪除資產（標記為刪除）
      parameters:
        - name: assetId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  id: { type: string }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/assets/{assetId}/status:
    post:
      tags: [AssetInventory]
      summary: 更新單一資產狀態
      parameters:
        - name: assetId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [填報中, 待簽核, 已完成] }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InformationAsset' }

  /api/assets/{assetId}/appendix10:
    get:
      tags: [AssetInventory]
      summary: 取得附表十評估資料
      parameters:
        - name: assetId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  assetId: { type: string }
                  protectionLevel: { type: string }
                  assessments: { type: array, items: { type: object } }
                  complianceStatus: { type: string }
    post:
      tags: [AssetInventory]
      summary: 儲存附表十評估資料
      parameters:
        - name: assetId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                protectionLevel: { type: string }
                assessments: { type: array, items: { type: object } }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  assetId: { type: string }
                  protectionLevel: { type: string }
                  assessments: { type: array, items: { type: object } }
                  complianceStatus: { type: string }

  # ───── Dashboard ───────────────────────────────────

  /api/my-tasks:
    get:
      tags: [Dashboard]
      summary: 取得目前使用者待辦事項
      parameters:
        - name: auditYear
          in: query
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  tasks:
                    type: array
                    items:
                      type: object
                      properties:
                        type: { type: string }
                        priority: { type: string, enum: [urgent, high, medium, low] }
                        title: { type: string }
                        subtitle: { type: string }
                        action: { type: string }
                        route: { type: string }
                  summary:
                    type: object
                    properties:
                      checklistStatus: { type: string }
                      openCases: { type: integer }
                      pendingCases: { type: integer }
                      trainingStatus: { type: string }
                  units: { type: array, items: { type: string } }
                  auditYear: { type: string }

  /api/dashboard/summary:
    get:
      tags: [Dashboard]
      summary: 管理員儀表板總覽（管理員）
      parameters:
        - name: auditYear
          in: query
          schema: { type: string }
        - name: trainingYear
          in: query
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  checklist:
                    type: object
                    properties:
                      totalUnits: { type: integer }
                      submittedUnits: { type: integer }
                      notFiledUnits: { type: integer }
                      draftCount: { type: integer }
                      submittedCount: { type: integer }
                  training:
                    type: object
                    properties:
                      totalForms: { type: integer }
                      completedForms: { type: integer }
                      draftForms: { type: integer }
                      avgCompletionRate: { type: number }
                  pending:
                    type: object
                    properties:
                      applicationsPendingReview: { type: integer }
                      correctivePending: { type: integer }
                      correctiveOpenTotal: { type: integer }
                      totalPendingItems: { type: integer }
                  generatedAt: { type: string, format: date-time }
        '403': { $ref: '#/components/responses/Forbidden' }

  # ───── Ops ─────────────────────────────────────────

  /api/batch-reminder:
    post:
      tags: [Ops]
      summary: 批次催辦未送出檢核表（管理員）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                action: { type: string }
                payload:
                  type: object
                  properties:
                    auditYear: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  totalTargets: { type: integer }
                  sent: { type: integer }
                  submittedUnits: { type: integer }
                  auditYear: { type: string }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/server-stats:
    get:
      tags: [Ops]
      summary: 伺服器運行狀態（管理員）
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  uptime: { type: integer }
                  uptimeHuman: { type: string }
                  memory:
                    type: object
                    properties:
                      rss: { type: string }
                      heap: { type: string }
                  database:
                    type: object
                    properties:
                      ok: { type: boolean }
                      latencyMs: { type: number }
                  disk:
                    type: object
                    properties:
                      totalFiles: { type: integer }
                      totalSizeMB: { type: number }
                  nodeVersion: { type: string }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/audit-report/pdf:
    get:
      tags: [Ops]
      summary: 下載稽核報告 PDF（管理員）
      parameters:
        - name: auditYear
          in: query
          schema: { type: string }
      responses:
        '200':
          description: PDF 檔案
          content:
            application/pdf:
              schema: { type: string, format: binary }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/overdue-check:
    post:
      tags: [Ops]
      summary: 觸發逾期矯正單檢查與通知（管理員）
      requestBody:
        content:
          application/json:
            schema: { type: object }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  checked: { type: integer }
                  notified: { type: integer }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/audit-year/summary:
    get:
      tags: [Ops]
      summary: 年度結算摘要（管理員）
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  checklistYears:
                    type: array
                    items:
                      type: object
                      properties:
                        year: { type: string }
                        total: { type: integer }
                        submitted: { type: integer }
                  trainingYears:
                    type: array
                    items:
                      type: object
                      properties:
                        year: { type: string }
                        total: { type: integer }
                        completed: { type: integer }
        '403': { $ref: '#/components/responses/Forbidden' }

name: Role Flow QA

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  role-flow-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Start local preview server
        run: |
          node .codex-local-server.cjs > server.log 2>&1 &
          echo $! > server.pid

      - name: Wait for local preview server
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat server.log
          exit 1

      - name: Run layered role tests
        run: npm run test:role:all

      - name: Upload role-flow artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: role-flow-artifacts
          path: |
            server.log
            test-artifacts/

      - name: Stop local preview server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill "$(cat server.pid)" || true
          fi

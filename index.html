<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>內部稽核管考追蹤系統 - Corrective Action Tracking</title>
  <meta name="description" content="國立臺灣大學內部稽核管考追蹤系統，提供矯正單管理、內稽檢核表、教育訓練時數統計與單位治理功能。">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <script>
    (function () {
      var cacheKey = String(Date.now());
      var head = document.head;
      window.__APP_ASSET_VERSION__ = cacheKey;

      function appendLink(rel, href, type) {
        var link = document.createElement('link');
        link.rel = rel;
        link.href = href + '?v=' + cacheKey;
        if (type) link.type = type;
        head.appendChild(link);
      }

      appendLink('icon', 'favicon.svg', 'image/svg+xml');
      appendLink('stylesheet', 'styles.css');
    })();
  </script>
</head>

<body>
  <aside class="sidebar" id="sidebar"></aside>
  <header class="header" id="header"></header>
  <main class="main-content" id="app"></main>
  <div class="toast-container" id="toast-container"></div>
  <div id="modal-root"></div>

  <script>
    (function () {
      var cacheKey = window.__APP_ASSET_VERSION__ || String(Date.now());
      var assets = [
        'vendor/lucide.min.js',
        'vendor/xlsx.full.min.js',
        'units.js',
        'data-module.js',
        'auth-module.js',
        'shell-module.js',
        'case-module.js',
        'admin-module.js',
        'checklist-module.js',
        'training-module.js',
        'app.js'
      ];
      var index = 0;

      function loadNext() {
        if (index >= assets.length) return;

        var script = document.createElement('script');
        script.src = assets[index] + '?v=' + cacheKey;
        script.async = false;
        script.onload = function () {
          index += 1;
          loadNext();
        };
        script.onerror = function () {
          console.error('Failed to load asset:', script.src);
        };
        document.body.appendChild(script);
      }

      loadNext();
    })();
  </script>
</body>

</html>

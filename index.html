<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>資訊安全管理系統 - Information Security Management System</title>
  <meta name="description" content="國立臺灣大學資訊安全管理系統，提供矯正單、內稽檢核表、資安教育訓練統計、帳號權限與附件管理的整合前端入口。">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https://ntums365.sharepoint.com; connect-src 'self' https://ntums365.sharepoint.com; font-src 'self' data: https://fonts.gstatic.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-src 'none'; child-src 'none';">
  <meta http-equiv="Cross-Origin-Embedder-Policy" content="require-corp">
  <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin">
  <meta http-equiv="Cross-Origin-Resource-Policy" content="same-origin">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="Permissions-Policy"
    content="camera=(), microphone=(), geolocation=(), usb=(), payment=(), browsing-topics=()">
  <meta name="theme-color" content="#2459a9" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap">
  <link rel="stylesheet" href="styles.critical.min.css" data-critical-styles>
  <script src="asset-loader.js"></script>
</head>

<body>
  <a class="skip-link" href="#app">跳到主要內容</a>
  <aside class="sidebar" id="sidebar" aria-label="主要導覽"></aside>
  <header class="header" id="header" aria-label="頂部工具列"></header>
  <main class="main-content" id="app"></main>
  <div class="toast-container" id="toast-container" role="status" aria-live="polite" aria-relevant="additions text" aria-atomic="true"></div>
  <div id="modal-root" aria-label="對話視窗"></div>
</body>

</html>
